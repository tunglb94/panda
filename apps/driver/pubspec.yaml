name: driver
description: "FAIRRIDE Driver App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.0
  http: ^1.2.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0
  audioplayers: ^6.1.0
  vibration: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/mascot/
    - assets/sounds/
