syntax = "proto3";

package trip.v1;

option go_package = "github.com/fairride/trip/grpc/trippb";

import "google/protobuf/timestamp.proto";

// TripService manages the FAIRRIDE trip lifecycle.
// No pricing, dispatch, payment, wallet, or GPS routing in this service.
service TripService {
  // CreateTrip creates a new trip in Pending status.
  rpc CreateTrip(CreateTripRequest) returns (TripResponse);

  // CancelTrip cancels a trip that has not yet started or completed.
  rpc CancelTrip(CancelTripRequest) returns (TripResponse);

  // GetTrip returns a trip by its ID.
  rpc GetTrip(GetTripRequest) returns (TripResponse);

  // MarkDriverArrived transitions a trip from DriverAssigned to DriverArrived.
  rpc MarkDriverArrived(GetTripRequest) returns (TripResponse);

  // StartTrip transitions a trip from DriverAssigned/DriverArrived to InProgress.
  rpc StartTrip(StartTripRequest) returns (TripResponse);

  // CompleteTrip transitions a trip from InProgress to Completed and records the fare.
  // The caller is responsible for computing the fare before calling this RPC.
  rpc CompleteTrip(CompleteTripRequest) returns (TripResponse);

  // InitiatePayment transitions a completed trip to PaymentPending.
  rpc InitiatePayment(GetTripRequest) returns (TripResponse);

  // PayTrip processes payment and transitions PaymentPending → Settled.
  // req.reason carries the payment method ("cash" | "wallet").
  rpc PayTrip(CancelTripRequest) returns (TripResponse);

  // ListTripsByRider returns all trips for a rider, newest first.
  rpc ListTripsByRider(ListTripsRequest) returns (TripsResponse);

  // ListTripsByDriver returns all trips for a driver, newest first.
  rpc ListTripsByDriver(ListTripsRequest) returns (TripsResponse);

  // ─── Delivery V1 Phase 4 (docs/business/DELIVERY_V1_DESIGN.md) ────────────
  // Only valid for a trip with trip_type == "delivery"; returns
  // InvalidArgument for a Ride trip. Reuses GetTripRequest/TripResponse —
  // no new message types, 100% backward compatible.

  // PickupParcel transitions a Delivery from Accepted to ParcelPickedUp,
  // and (reusing Trip's existing Start()) the linked Trip to InProgress.
  rpc PickupParcel(GetTripRequest) returns (TripResponse);

  // StartDelivery transitions a Delivery from ParcelPickedUp to InDelivery.
  // Trip.Status is not affected (already InProgress from PickupParcel).
  rpc StartDelivery(GetTripRequest) returns (TripResponse);

  // CompleteDelivery marks a Delivery Delivered then Completed in one call
  // (mirrors PayTrip's MarkPaid→Settle chaining). Trip.Status is not
  // advanced — that requires a real fare from Pricing, out of scope here.
  rpc CompleteDelivery(GetTripRequest) returns (TripResponse);
}

// ─── Request messages ────────────────────────────────────────────────────────

message CreateTripRequest {
  string rider_id        = 1;
  string pickup_address  = 2;
  string dropoff_address = 3;

  // trip_type is "ride" (default; empty also means ride) or "delivery".
  // Delivery V1 Phase 2 (docs/business/DELIVERY_V1_DESIGN.md) — additive,
  // 100% backward compatible with every existing Ride caller that omits it.
  string trip_type = 4;

  // The following fields are only read when trip_type == "delivery".
  string pickup_contact_name  = 5;
  string pickup_contact_phone = 6;
  string receiver_name        = 7;
  string receiver_phone       = 8;
  string package_note         = 9;
  int64  package_value        = 10; // smallest currency unit
  double package_weight       = 11; // kg
}

message CancelTripRequest {
  string trip_id = 1;
  string reason  = 2;
}

message GetTripRequest {
  string trip_id = 1;
}

message StartTripRequest {
  string trip_id = 1;
}

message CompleteTripRequest {
  string trip_id          = 1;
  int64  final_fare_total = 2; // smallest currency unit (e.g., cents)
  string fare_currency    = 3; // ISO 4217 code (e.g., "USD")
}

// ─── Response ────────────────────────────────────────────────────────────────

message TripResponse {
  TripProto trip = 1;
}

message ListTripsRequest {
  string party_id = 1; // rider_id for ListTripsByRider; driver_id for ListTripsByDriver
}

message TripsResponse {
  repeated TripProto trips = 1;
}

// ─── Shared payload ───────────────────────────────────────────────────────────

message TripProto {
  string trip_id             = 1;
  string rider_id            = 2;
  string driver_id           = 3; // empty until driver is assigned
  string status              = 4;
  string pickup_address      = 5;
  string dropoff_address     = 6;
  string cancellation_reason = 7; // empty unless cancelled
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  int64  final_fare_total              = 10; // 0 until completed
  string fare_currency                 = 11; // empty until completed

  // trip_type is "ride" or "delivery"; delivery_id is set only when
  // trip_type == "delivery". Delivery V1 Phase 2.
  string trip_type   = 12;
  string delivery_id = 13;

  // delivery_status mirrors entity.DeliveryStatus ("CREATED"|"ACCEPTED"|
  // "PARCEL_PICKED_UP"|"IN_DELIVERY"|"DELIVERED"|"COMPLETED"|"CANCELLED");
  // empty for a Ride trip. Delivery V1 Phase 4
  // (docs/business/DELIVERY_V1_DESIGN.md).
  string delivery_status = 14;
}
